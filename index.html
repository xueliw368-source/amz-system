<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亚马逊入库视觉核对系统 | Professional Tracking Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .scale-in { animation: scaleIn 0.2s ease-out; }
        @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .error-glow { box-shadow: 0 0 15px rgba(239, 68, 68, 0.2); border-color: #fecaca !important; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    const iconData = lucide[name.charAt(0).toUpperCase() + name.slice(1)];
                    if (iconData) {
                        iconRef.current.innerHTML = '';
                        lucide.createIcons({
                            icons: { [name]: iconData },
                            attrs: { strokeWidth: 2.5, width: size, height: size, class: className }
                        });
                    }
                }
            }, [name, size, className]);
            return <i ref={iconRef} className={className} style={{display: 'inline-flex', width: size, height: size}}></i>;
        };

        const App = () => {
            const appId = 'amz-flow-v3-tracking';
            const [view, setView] = useState('workflow'); 
            const [activeTab, setActiveTab] = useState('pending');
            const [showImportModal, setShowImportModal] = useState(false);
            const [showConflictModal, setShowConflictModal] = useState(false);
            const [showConfirmClear, setShowConfirmClear] = useState(false);
            const [clearTarget, setClearTarget] = useState(null);
            const [batchText, setBatchText] = useState('');
            const [importType, setImportType] = useState('');
            const [searchQuery, setSearchQuery] = useState('');
            const [pendingConflicts, setPendingConflicts] = useState([]);

            // 数据存储
            const [visuals, setVisuals] = useState(() => JSON.parse(localStorage.getItem(`${appId}_visuals`) || '[]'));
            const [mappings, setMappings] = useState(() => JSON.parse(localStorage.getItem(`${appId}_mappings`) || '[]'));
            const [orders, setOrders] = useState(() => JSON.parse(localStorage.getItem(`${appId}_orders`) || '[]'));

            useEffect(() => {
                localStorage.setItem(`${appId}_visuals`, JSON.stringify(visuals));
                localStorage.setItem(`${appId}_mappings`, JSON.stringify(mappings));
                localStorage.setItem(`${appId}_orders`, JSON.stringify(orders));
            }, [visuals, mappings, orders]);

            // 视觉映射
            const visualMap = useMemo(() => new Map(visuals.map(v => [v.sku.toUpperCase(), v.image])), [visuals]);
            
            // 核心匹配逻辑：SKU + Shop 联合匹配
            const getMapping = (sku, shop) => {
                if (!sku) return null;
                const normalizedSku = sku.trim().toUpperCase();
                const normalizedShop = (shop || '').trim().toUpperCase();
                return mappings.find(m => m.sku.toUpperCase() === normalizedSku && m.shop.toUpperCase() === normalizedShop) 
                       || mappings.find(m => m.sku.toUpperCase() === normalizedSku);
            };

            const filteredOrders = useMemo(() => {
                return orders.filter(o => {
                    const matchStatus = activeTab === 'error' ? o.isError : (o.status === activeTab && !o.isError);
                    if (!matchStatus) return false;
                    const map = getMapping(o.sku, o.shop);
                    const searchStr = `${o.sku} ${o.shop} ${o.date} ${o.remark || ''} ${map?.msku || ''}`.toLowerCase();
                    return searchStr.includes(searchQuery.toLowerCase());
                });
            }, [orders, activeTab, searchQuery, mappings]);

            const exportData = (type) => {
                let csv = "";
                let filename = "";
                if (type === 'orders') {
                    csv = "\ufeff日期,SKU,数量,店铺,发货方式,状态,备注\n" + orders.map(o => `${o.date},${o.sku},${o.quantity},${o.shop},${o.shippingMethod || ''},${o.status},${o.remark || ''}`).join("\n");
                    filename = `Orders_Export_${new Date().toLocaleDateString()}.csv`;
                } else if (type === 'mapping') {
                    csv = "\ufeffSKU,MSKU,FNSKU,Shop\n" + mappings.map(m => `${m.sku},${m.msku},${m.fnsku},${m.shop}`).join("\n");
                    filename = "Mapping_Backup.csv";
                } else if (type === 'visual') {
                    csv = "\ufeffSKU,ImageURL\n" + visuals.map(v => `${v.sku},${v.image}`).join("\n");
                    filename = "Visuals_Backup.csv";
                }
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = filename;
                link.click();
            };

            const downloadTemplate = (type) => {
                let content = "";
                if (type === 'mapping') content = "\ufeffSKU,MSKU,FNSKU,Shop\nSKU001,MSKU001,FNSKU001,US-STORE\n";
                else if (type === 'visual') content = "\ufeffSKU,Image_URL\nSKU001,https://example.com/img.jpg\n";
                else if (type === 'order') content = "\ufeffDate,SKU,Quantity,Shop,ShippingMethod,Remark\n2024-05-20,SKU001,50,US-STORE,Sea,Fragile\n";
                
                const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `${type}_template.csv`;
                a.click();
            };

            const confirmClearData = (type) => {
                setClearTarget(type);
                setShowConfirmClear(true);
            };

            const executeClearData = () => {
                if (clearTarget === 'orders') setOrders([]);
                if (clearTarget === 'mapping') setMappings([]);
                if (clearTarget === 'visuals') setVisuals([]);
                setShowConfirmClear(false);
            };

            const handleImport = () => {
                const lines = batchText.split('\n').filter(l => l.trim());
                if (importType === 'order') {
                    const newOrders = lines.map((l, i) => {
                        const parts = l.split(/\s+/).map(p => p.trim());
                        return {
                            id: Date.now() + i,
                            date: parts[0] || '',
                            sku: (parts[1] || '').toUpperCase(),
                            quantity: parseInt(parts[2]) || 0,
                            shop: parts[3] || 'AMZ',
                            shippingMethod: parts[4] || 'Air',
                            remark: parts[5] || '',
                            status: 'pending',
                            isError: false
                        };
                    });
                    setOrders([...newOrders, ...orders]);
                    setShowImportModal(false);
                } else {
                    const conflicts = [];
                    const cleanData = [];
                    lines.forEach(l => {
                        const parts = l.split(/\s+/).map(p => p.trim());
                        const sku = (parts[0] || '').toUpperCase();
                        if (!sku) return;

                        if (importType === 'mapping') {
                            const newData = { 
                                sku, 
                                msku: parts[1] || '', 
                                fnsku: parts[2] || '', 
                                shop: (parts[3] || 'AMZ').toUpperCase() 
                            };
                            const existing = mappings.find(m => m.sku === newData.sku && m.shop === newData.shop);
                            if (existing) {
                                if (existing.msku === newData.msku && existing.fnsku === newData.fnsku) {
                                } else {
                                    conflicts.push({ type: 'mapping', old: existing, new: newData });
                                }
                            } else {
                                cleanData.push(newData);
                            }
                        } else if (importType === 'visual') {
                            const newData = { sku, image: parts[1] || '' };
                            const existing = visuals.find(v => v.sku === sku);
                            if (existing && existing.image !== newData.image) {
                                conflicts.push({ type: 'visual', old: existing, new: newData });
                            } else {
                                cleanData.push(newData);
                            }
                        }
                    });

                    if (conflicts.length > 0) {
                        setPendingConflicts(conflicts);
                        setShowConflictModal(true);
                    }
                    
                    if (importType === 'mapping') {
                        const updated = [...mappings];
                        cleanData.forEach(d => {
                            const idx = updated.findIndex(u => u.sku === d.sku && u.shop === d.shop);
                            if(idx > -1) updated[idx] = d; else updated.push(d);
                        });
                        setMappings(updated);
                    } else {
                        const updated = [...visuals];
                        cleanData.forEach(d => {
                            const idx = updated.findIndex(u => u.sku === d.sku);
                            if(idx > -1) updated[idx] = d; else updated.push(d);
                        });
                        setVisuals(updated);
                    }
                    if (conflicts.length === 0) setShowImportModal(false);
                }
                setBatchText('');
            };

            const resolveConflict = (decision) => {
                if (decision === 'overwrite') {
                    if (importType === 'mapping') {
                        const updated = [...mappings];
                        pendingConflicts.forEach(c => {
                            const idx = updated.findIndex(u => u.sku === c.new.sku && u.shop === c.new.shop);
                            if(idx > -1) updated[idx] = c.new; else updated.push(c.new);
                        });
                        setMappings(updated);
                    } else {
                        const updated = [...visuals];
                        pendingConflicts.forEach(c => {
                            const idx = updated.findIndex(u => u.sku === c.new.sku);
                            if(idx > -1) updated[idx] = c.new; else updated.push(c.new);
                        });
                        setVisuals(updated);
                    }
                }
                setShowConflictModal(false);
                setShowImportModal(false);
                setPendingConflicts([]);
            };

            const updateOrderField = (id, field, value) => {
                const cleanValue = typeof value === 'string' ? value.trim() : value;
                setOrders(orders.map(o => o.id === id ? {...o, [field]: cleanValue} : o));
            };

            return (
                <div className="min-h-screen flex text-slate-800">
                    <aside className="w-72 bg-slate-900 text-white fixed h-full flex flex-col shadow-2xl z-30">
                        <div className="p-8 pb-12 flex items-center gap-3">
                            <div className="w-10 h-10 bg-gradient-to-br from-orange-400 to-orange-600 rounded-xl flex items-center justify-center shadow-lg shadow-orange-500/20">
                                <Icon name="package" size={24} className="text-white"/>
                            </div>
                            <div>
                                <h1 className="font-black text-xl italic leading-none uppercase tracking-tighter">Flow Elite</h1>
                                <p className="text-[10px] text-slate-400 font-bold tracking-widest uppercase mt-1">v3.2 Clear View</p>
                            </div>
                        </div>

                        <nav className="px-4 space-y-1">
                            {[
                                {id: 'workflow', label: '每日核对任务', icon: 'layers'},
                                {id: 'mapping', label: '映射关系库', icon: 'gitMerge'},
                                {id: 'visuals', label: '产品视觉库', icon: 'image'}
                            ].map(item => (
                                <button key={item.id} onClick={() => setView(item.id)} className={`w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold transition-all ${view === item.id ? 'bg-orange-600 text-white shadow-lg shadow-orange-600/30' : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200'}`}>
                                    <Icon name={item.icon} size={20}/> {item.label}
                                </button>
                            ))}
                        </nav>

                        <div className="mt-auto p-6 space-y-3">
                            <div className="bg-slate-800/50 p-5 rounded-3xl border border-white/5">
                                <p className="text-[10px] font-black text-slate-500 uppercase mb-3 text-center tracking-widest">Global Export</p>
                                <button onClick={() => exportData('orders')} className="w-full py-3 bg-slate-700 hover:bg-slate-600 rounded-xl text-xs font-black transition-all mb-2 uppercase">导出所有订单</button>
                                <div className="grid grid-cols-2 gap-2">
                                    <button onClick={() => exportData('mapping')} className="py-2 bg-slate-800 hover:bg-slate-700 rounded-xl text-[10px] font-bold uppercase">导出映射表</button>
                                    <button onClick={() => exportData('visual')} className="py-2 bg-slate-800 hover:bg-slate-700 rounded-xl text-[10px] font-bold uppercase">导出视觉库</button>
                                </div>
                            </div>
                        </div>
                    </aside>

                    <main className="flex-grow ml-72 p-10">
                        {view === 'workflow' && (
                            <div className="max-w-6xl mx-auto">
                                <div className="flex justify-between items-end mb-10">
                                    <div>
                                        <h2 className="text-4xl font-black italic uppercase tracking-tighter flex items-center gap-3">
                                            Inbound Tasks
                                            <span className="bg-orange-100 text-orange-600 text-xs px-3 py-1 rounded-full not-italic font-black uppercase">Auto-Match</span>
                                        </h2>
                                        <p className="text-slate-400 font-bold text-sm mt-1">根据 SKU + 店铺 (Shop) 自动匹配 MSKU 映射资料（自动过滤空格）</p>
                                    </div>
                                    <div className="flex gap-3">
                                        <div className="relative group">
                                            <Icon name="search" size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-orange-500"/>
                                            <input 
                                                type="text" 
                                                placeholder="搜索 SKU/店铺/备注..." 
                                                className="pl-11 pr-6 py-4 bg-white border border-slate-200 rounded-2xl text-sm font-bold w-64 focus:ring-4 focus:ring-orange-100 focus:border-orange-500 outline-none transition-all shadow-sm"
                                                value={searchQuery}
                                                onChange={e => setSearchQuery(e.target.value)}
                                            />
                                        </div>
                                        <button onClick={() => confirmClearData('orders')} className="bg-white border border-red-200 text-red-500 px-6 py-4 rounded-2xl font-black text-xs hover:bg-red-50 transition-all flex items-center gap-2">
                                            <Icon name="trash2" size={16}/> 清空列表
                                        </button>
                                        <button onClick={() => {setImportType('order'); setShowImportModal(true);}} className="bg-slate-900 text-white px-8 py-4 rounded-2xl font-black flex items-center gap-2 shadow-xl hover:bg-orange-600 hover:-translate-y-1 transition-all active:translate-y-0">
                                            <Icon name="plus" size={18}/> 导入今日下单
                                        </button>
                                    </div>
                                </div>

                                <div className="flex gap-8 border-b-2 border-slate-100 mb-8 overflow-x-auto custom-scrollbar">
                                    {[
                                        {id: 'pending', label: '待核对', color: 'orange', count: orders.filter(o => !o.isError && o.status === 'pending').length},
                                        {id: 'received', label: '已核对', color: 'green', count: orders.filter(o => !o.isError && o.status === 'received').length},
                                        {id: 'error', label: '异常件', color: 'red', count: orders.filter(o => o.isError).length}
                                    ].map(tab => (
                                        <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`pb-4 px-2 whitespace-nowrap text-xs font-black uppercase tracking-widest flex items-center gap-2 transition-all relative ${activeTab === tab.id ? 'text-slate-900' : 'text-slate-300'}`}>
                                            {tab.label} <span className={`px-2 py-0.5 rounded-full text-[10px] bg-${tab.color}-100 text-${tab.color}-600`}>{tab.count}</span>
                                            {activeTab === tab.id && <div className={`absolute bottom-[-2px] left-0 w-full h-1 bg-${tab.color}-500 rounded-full`}></div>}
                                        </button>
                                    ))}
                                </div>

                                <div className="space-y-4">
                                    {filteredOrders.length === 0 ? (
                                        <div className="py-20 text-center border-2 border-dashed border-slate-100 rounded-[3rem]">
                                            <Icon name="searchX" size={48} className="text-slate-200 mx-auto mb-4"/>
                                            <p className="text-slate-400 font-bold">未找到符合条件的订单数据</p>
                                        </div>
                                    ) : filteredOrders.map(order => {
                                        const img = visualMap.get(order.sku);
                                        const map = getMapping(order.sku, order.shop);
                                        
                                        return (
                                            <div key={order.id} className={`bg-white rounded-[2.5rem] p-6 flex items-center gap-8 border transition-all scale-in hover:shadow-2xl hover:shadow-slate-200/50 ${order.isError ? 'error-glow border-red-200 bg-red-50/10' : 'border-slate-100 shadow-sm shadow-slate-200/40'}`}>
                                                <div className="w-36 h-36 bg-slate-50 rounded-[2rem] flex-shrink-0 overflow-hidden border border-slate-100 flex items-center justify-center group relative">
                                                    {img ? <img src={img} className="w-full h-full object-cover" /> : <Icon name="image" size={40} className="text-slate-200"/>}
                                                </div>
                                                
                                                <div className="flex-grow grid grid-cols-4 gap-4 items-center">
                                                    <div className="col-span-1 space-y-1">
                                                        <div className="flex items-center gap-2 group">
                                                            <span className="text-[9px] font-black text-slate-300 uppercase">SKU</span>
                                                            <input 
                                                                className="text-xl font-black bg-transparent border-b border-transparent hover:border-slate-200 focus:border-orange-500 outline-none w-full truncate"
                                                                value={order.sku}
                                                                onChange={e => updateOrderField(order.id, 'sku', e.target.value.toUpperCase())}
                                                            />
                                                        </div>
                                                        <div className="flex items-center gap-2">
                                                            <span className="text-[9px] font-black text-slate-300 uppercase italic">SHOP</span>
                                                            <input 
                                                                className="text-xs font-black text-orange-600 bg-transparent border-b border-transparent hover:border-slate-200 focus:border-orange-500 outline-none w-24 uppercase"
                                                                value={order.shop}
                                                                onChange={e => updateOrderField(order.id, 'shop', e.target.value)}
                                                            />
                                                        </div>
                                                    </div>

                                                    <div className="col-span-1 border-l border-slate-100 pl-4 space-y-1">
                                                        <div className="flex flex-col">
                                                            <span className="text-[8px] font-black text-slate-400 uppercase">MSKU (匹配中...)</span>
                                                            <span className={`text-xs font-bold truncate ${map ? 'text-slate-900' : 'text-red-400 italic'}`}>
                                                                {map?.msku || '映射库中未找到'}
                                                            </span>
                                                        </div>
                                                        <div className="flex flex-col">
                                                            <span className="text-[8px] font-black text-slate-400 uppercase">FNSKU</span>
                                                            <span className="text-[10px] font-bold text-slate-400 truncate tracking-tight">{map?.fnsku || '-'}</span>
                                                        </div>
                                                    </div>

                                                    <div className="col-span-1 border-l border-slate-100 pl-4 space-y-2">
                                                        <div className="flex items-center gap-3">
                                                            <div className="bg-slate-50 px-3 py-1 rounded-lg">
                                                                <span className="text-[8px] font-black text-slate-400 uppercase block leading-none">Qty</span>
                                                                <input 
                                                                    type="number"
                                                                    className="text-lg font-black bg-transparent w-12 outline-none"
                                                                    value={order.quantity}
                                                                    onChange={e => updateOrderField(order.id, 'quantity', e.target.value)}
                                                                />
                                                            </div>
                                                            <input 
                                                                className="text-[10px] font-black bg-slate-100 px-2 py-1 rounded-lg w-20 outline-none text-slate-500 uppercase"
                                                                value={order.shippingMethod}
                                                                placeholder="发货方式"
                                                                onChange={e => updateOrderField(order.id, 'shippingMethod', e.target.value)}
                                                            />
                                                        </div>
                                                        <input 
                                                            className="text-[10px] italic bg-transparent border-b border-dashed border-slate-200 hover:border-orange-300 w-full outline-none text-slate-400 focus:text-slate-800"
                                                            value={order.remark}
                                                            placeholder="备注内容..."
                                                            onChange={e => updateOrderField(order.id, 'remark', e.target.value)}
                                                        />
                                                    </div>

                                                    <div className="col-span-1 flex items-center justify-end gap-3 pr-2">
                                                        <button 
                                                            title={order.isError ? "取消异常" : "标记为异常"}
                                                            onClick={() => updateOrderField(order.id, 'isError', !order.isError)}
                                                            className={`w-12 h-12 rounded-2xl flex items-center justify-center transition-all ${order.isError ? 'bg-red-500 text-white shadow-lg shadow-red-500/20' : 'bg-slate-100 text-slate-400 hover:bg-red-50 hover:text-red-500'}`}
                                                        >
                                                            <Icon name="alertTriangle" size={20}/>
                                                        </button>
                                                        <button 
                                                            onClick={() => updateOrderField(order.id, 'status', order.status === 'pending' ? 'received' : 'pending')}
                                                            className={`w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg transition-all active:scale-90 ${order.status === 'received' ? 'bg-green-500 text-white' : 'bg-slate-900 text-white hover:bg-green-600'}`}
                                                        >
                                                            <Icon name={order.status === 'received' ? "check" : "chevronRight"} size={24}/>
                                                        </button>
                                                        
                                                        {/* 高对比度显眼删除按钮 */}
                                                        <button 
                                                            onClick={() => setOrders(orders.filter(o => o.id !== order.id))} 
                                                            className="w-12 h-12 rounded-2xl bg-red-500 text-white hover:bg-red-600 transition-all flex items-center justify-center shadow-lg shadow-red-500/30"
                                                            title="删除此行"
                                                        >
                                                            <Icon name="trash2" size={18}/>
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                        )}

                        {view === 'mapping' && (
                            <div className="max-w-6xl mx-auto">
                                <header className="flex justify-between items-end mb-10">
                                    <div>
                                        <h2 className="text-4xl font-black italic uppercase tracking-tighter">Mapping DB</h2>
                                        <p className="text-slate-400 font-bold">映射库：相同 SKU 可对应不同店铺的 MSKU 数据</p>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => confirmClearData('mapping')} className="bg-white border border-red-200 text-red-500 px-6 py-4 rounded-2xl font-black text-xs hover:bg-red-50 transition-all flex items-center gap-2">
                                            <Icon name="trash2" size={16}/> 清空映射库
                                        </button>
                                        <button onClick={() => downloadTemplate('mapping')} className="bg-white border border-slate-200 px-6 py-4 rounded-2xl font-bold flex items-center gap-2 hover:bg-slate-50 transition-all text-xs">
                                            模板
                                        </button>
                                        <button onClick={() => {setImportType('mapping'); setShowImportModal(true);}} className="bg-slate-900 text-white px-8 py-4 rounded-2xl font-black flex items-center gap-2 hover:bg-blue-600 transition-all shadow-xl">
                                            批量导入
                                        </button>
                                    </div>
                                </header>
                                <div className="bg-white rounded-[3rem] overflow-hidden border border-slate-100 shadow-xl shadow-slate-200/50">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50/80 text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100">
                                            <tr>
                                                <th className="px-10 py-6">SKU</th>
                                                <th className="px-10 py-6">SHOP</th>
                                                <th className="px-10 py-6">MSKU (Amazon)</th>
                                                <th className="px-10 py-6">FNSKU</th>
                                                <th className="px-10 py-6 text-right">ACTION</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50">
                                            {mappings.sort((a,b) => a.sku.localeCompare(b.sku)).map((m, idx) => (
                                                <tr key={idx} className="hover:bg-slate-50 group">
                                                    <td className="px-10 py-5 font-black text-slate-800">{m.sku}</td>
                                                    <td className="px-10 py-5">
                                                        <span className="bg-orange-50 text-orange-600 text-[10px] font-black px-2 py-1 rounded-md uppercase">{m.shop}</span>
                                                    </td>
                                                    <td className="px-10 py-5 text-sm font-bold text-slate-600">{m.msku}</td>
                                                    <td className="px-10 py-5 text-sm font-bold text-slate-400">{m.fnsku}</td>
                                                    <td className="px-10 py-5 text-right opacity-0 group-hover:opacity-100 transition-opacity">
                                                        <button onClick={() => setMappings(mappings.filter((_, i) => i !== idx))} className="text-red-500 hover:text-red-700 p-2"><Icon name="trash2" size={18}/></button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {view === 'visuals' && (
                            <div className="max-w-6xl mx-auto">
                                <header className="flex justify-between items-end mb-10">
                                    <div>
                                        <h2 className="text-4xl font-black italic uppercase tracking-tighter">Visual Library</h2>
                                        <p className="text-slate-400 font-bold">视觉库：管理 SKU 与 图片的对应关系</p>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => confirmClearData('visuals')} className="bg-white border border-red-200 text-red-500 px-6 py-4 rounded-2xl font-black text-xs hover:bg-red-50 transition-all flex items-center gap-2">
                                            <Icon name="trash2" size={16}/> 清空视觉库
                                        </button>
                                        <button onClick={() => downloadTemplate('visual')} className="bg-white border border-slate-200 px-6 py-4 rounded-2xl font-bold flex items-center gap-2 hover:bg-slate-50 transition-all text-xs">模板</button>
                                        <button onClick={() => {setImportType('visual'); setShowImportModal(true);}} className="bg-slate-900 text-white px-8 py-4 rounded-2xl font-black flex items-center gap-2 hover:bg-blue-600 transition-all shadow-xl shadow-blue-500/20">批量导入</button>
                                    </div>
                                </header>
                                <div className="grid grid-cols-4 md:grid-cols-5 xl:grid-cols-6 gap-6">
                                    {visuals.map(v => (
                                        <div key={v.sku} className="bg-white rounded-[2.5rem] p-5 border border-slate-100 shadow-sm relative group scale-in hover:shadow-xl hover:border-orange-200 transition-all text-center">
                                            <div className="aspect-square bg-slate-50 rounded-[1.8rem] mb-4 overflow-hidden border border-slate-50 group-hover:scale-95 transition-transform">
                                                <img src={v.image} className="w-full h-full object-cover" />
                                            </div>
                                            <p className="font-black text-slate-700 text-xs truncate uppercase px-2">{v.sku}</p>
                                            <button 
                                                onClick={() => setVisuals(visuals.filter(x => x.sku !== v.sku))} 
                                                className="absolute top-3 right-3 p-2.5 bg-red-500 text-white rounded-2xl opacity-0 group-hover:opacity-100 transition-all shadow-xl shadow-red-500/20"
                                            >
                                                <Icon name="trash2" size={16}/>
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {showConfirmClear && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-xl z-[100] flex items-center justify-center p-6">
                            <div className="bg-white rounded-[3rem] w-full max-md p-10 shadow-2xl scale-in text-center border-4 border-red-50">
                                <div className="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <Icon name="alertTriangle" size={32}/>
                                </div>
                                <h3 className="text-xl font-black text-slate-900 mb-2 uppercase">确认批量删除？</h3>
                                <p className="text-slate-500 text-sm font-bold mb-8">
                                    此操作将永久清空 <span className="text-red-600">{clearTarget === 'orders' ? '当前所有核对任务' : clearTarget === 'mapping' ? '整个映射库数据' : '所有产品视觉图片'}</span>。
                                </p>
                                <div className="flex gap-4">
                                    <button onClick={() => setShowConfirmClear(false)} className="flex-1 py-4 bg-slate-100 text-slate-600 rounded-2xl font-black text-xs hover:bg-slate-200 transition-all uppercase">取消</button>
                                    <button onClick={executeClearData} className="flex-1 py-4 bg-red-600 text-white rounded-2xl font-black text-xs shadow-lg shadow-red-600/20 hover:bg-red-700 transition-all uppercase">确定清空</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showImportModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-xl z-[60] flex items-center justify-center p-6">
                            <div className="bg-white rounded-[3.5rem] w-full max-w-2xl p-14 shadow-2xl scale-in relative border border-white/20">
                                <h3 className="text-3xl font-black mb-1 italic uppercase tracking-tighter text-slate-900">
                                    {importType === 'order' ? '批量导入今日任务' : importType === 'mapping' ? '同步映射关系库' : '批量更新视觉资产'}
                                </h3>
                                <p className="text-slate-400 text-xs mb-10 font-bold uppercase tracking-widest flex items-center gap-2 border-l-4 border-orange-500 pl-4">
                                    <Icon name="info" size={14}/>
                                    {importType === 'order' && '日期 SKU 数量 店铺 发货方式 备注 (系统将自动清除空格)'}
                                    {importType === 'mapping' && 'SKU MSKU FNSKU 店铺 (系统将自动清除空格)'}
                                    {importType === 'visual' && 'SKU 图片链接'}
                                </p>
                                <textarea 
                                    className="w-full h-72 border-2 border-slate-100 bg-slate-50/50 rounded-[2.5rem] p-8 font-mono text-xs focus:ring-4 focus:ring-orange-100 focus:border-orange-500 outline-none transition-all custom-scrollbar placeholder:text-slate-300" 
                                    placeholder="从 Excel 直接复制数据并粘贴在此..." 
                                    value={batchText} 
                                    onChange={(e) => setBatchText(e.target.value)}
                                />
                                <div className="flex gap-4 mt-10">
                                    <button onClick={() => {setShowImportModal(false); setBatchText('');}} className="flex-1 py-5 bg-slate-100 text-slate-500 rounded-3xl font-black text-xs hover:bg-slate-200 transition-all tracking-widest">CANCEL</button>
                                    <button onClick={handleImport} className="flex-[2] py-5 bg-slate-900 text-white rounded-3xl font-black text-xs shadow-xl shadow-slate-900/20 hover:bg-orange-600 transition-all tracking-widest uppercase">Start Integration</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showConflictModal && (
                        <div className="fixed inset-0 bg-red-900/40 backdrop-blur-2xl z-[70] flex items-center justify-center p-6">
                            <div className="bg-white rounded-[3.5rem] w-full max-w-xl p-12 text-center shadow-2xl scale-in border-4 border-red-100">
                                <div className="w-20 h-20 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-8">
                                    <Icon name="alertCircle" size={40}/>
                                </div>
                                <h3 className="text-2xl font-black text-slate-900 mb-4">存在完全一致的重复记录</h3>
                                <p className="text-slate-500 font-bold mb-8">
                                    检测到 {pendingConflicts.length} 条记录在 SKU、店铺和内容上与现有库完全一致。
                                </p>
                                <div className="flex flex-col gap-3">
                                    <button onClick={() => resolveConflict('overwrite')} className="w-full py-4 bg-red-600 text-white rounded-2xl font-black shadow-lg shadow-red-600/20 hover:bg-red-700 transition-all uppercase text-xs">强制覆盖 (以新数据为准)</button>
                                    <button onClick={() => resolveConflict('skip')} className="w-full py-4 bg-slate-100 text-slate-600 rounded-2xl font-black hover:bg-slate-200 transition-all uppercase text-xs">跳过冲突</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
